appId: com.inknote.app
productName: InkNote
copyright: Copyright © 2026 InkNote

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - "!**/*.map"

# sql.js loads its WASM binary from process.resourcesPath in packaged builds
# (see src/main/db.ts → locateFile)
extraResources:
  - from: node_modules/sql.js/dist/sql-wasm.wasm
    to: sql-wasm.wasm

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}
  requestedExecutionLevel: asInvoker
  signingHashAlgorithms: []
  sign: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: InkNote

npmRebuild: true
asar: true
